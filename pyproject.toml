[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = ["backend/.venv", ".venv", "frontend/node_modules"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "S"]
ignore = [
  "B008",
  "S101",
  "S104",
]

[tool.ruff.lint.per-file-ignores]
"backend/app/schemas/api.py" = ["S105"]
"backend/tests/*" = ["E402", "S101", "S105", "S106"]
"backend/alembic/versions/*" = ["S608"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_return_any = true
warn_unused_ignores = true
exclude = "(^backend/tests/|^backend/alembic/)"

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = ["backend"]

[tool.coverage.run]
source = ["backend/app"]
omit = ["backend/app/audio/*"]

[tool.coverage.report]
show_missing = true
fail_under = 60

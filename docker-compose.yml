services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: audio_analysis
      MYSQL_USER: audio_user
      MYSQL_PASSWORD: audio_password
      MYSQL_ROOT_PASSWORD: local_root_password
      TZ: Asia/Tokyo
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # TCP is available only after MySQL's one-time initialization finishes.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrations:
    build: ./backend
    environment:
      AUDIO_DATABASE_URL: mysql+pymysql://audio_user:audio_password@mysql:3306/audio_analysis?charset=utf8mb4
      AUDIO_JWT_SECRET_KEY: local-development-secret-change-in-production
      AUDIO_REDIS_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
    command: alembic -c alembic.ini upgrade head

  backend:
    build: ./backend
    environment:
      AUDIO_DATABASE_URL: mysql+pymysql://audio_user:audio_password@mysql:3306/audio_analysis?charset=utf8mb4
      AUDIO_REDIS_URL: redis://redis:6379/0
      AUDIO_JWT_SECRET_KEY: local-development-secret-change-in-production
      AUDIO_CORS_ORIGINS: http://localhost:5173,http://localhost:8080
      AUDIO_UPLOAD_DIR: /app/storage/uploads
    volumes:
      - uploads:/app/storage/uploads
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=2)\""]
      interval: 10s
      timeout: 3s
      retries: 12

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  uploads:
